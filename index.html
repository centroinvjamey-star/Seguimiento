<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento · Jenny & Juan Luis</title>
<style>
  :root{
    --paper:#f6f4ef; --ink:#20211d; --muted:#6b6a61; --line:#ddd8cc;
    --card:#fffefb; --accent:#3a5a40; --accent-soft:#e7ede4;
    --pend:#a8763e; --proc:#3a6ea5; --real:#3a7d44; --bloq:#a4423a;
    --pend-bg:#f6ecdd; --proc-bg:#e4eef7; --real-bg:#e3f0e6; --bloq-bg:#f7e5e3;
    --shadow:0 1px 2px rgba(30,30,20,.06),0 4px 14px rgba(30,30,20,.05);
    --jenny:#8e4585; --juan:#2f6d6a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    -webkit-font-smoothing:antialiased;line-height:1.4;}
  .wrap{max-width:1400px;margin:0 auto;padding:22px 20px 80px}
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:14px}
  .brand h1{font-size:26px;margin:0;letter-spacing:-.01em;font-weight:600}
  .brand .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .synced{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--real);display:inline-block}
  .dot.saving{background:var(--pend);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .iobtn{font-family:ui-monospace,Menlo,monospace;font-size:11px;padding:6px 11px;border:1px solid var(--line);border-radius:7px;background:var(--card);cursor:pointer;color:var(--muted)}
  .iobtn:hover{border-color:var(--ink);color:var(--ink)}

  /* tabs */
  .tabs{display:flex;gap:4px;margin:18px 0 4px;border-bottom:1px solid var(--line)}
  .tab{font-size:14px;padding:9px 16px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:600}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent)}

  /* progress */
  .progress-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:16px 0 8px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;box-shadow:var(--shadow)}
  .pcard .plabel{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;margin-bottom:7px}
  .pcard .pcount{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);font-weight:400}
  .bar{height:7px;border-radius:20px;background:var(--accent-soft);overflow:hidden;display:flex}
  .bar i{display:block;height:100%}
  .bar i.real{background:var(--real)} .bar i.proc{background:var(--proc)} .bar i.pend{background:var(--pend)} .bar i.bloq{background:var(--bloq)}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 6px}
  .controls input[type=search]{flex:1;min-width:180px;font-family:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .chip{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.04em;padding:6px 11px;border:1px solid var(--line);border-radius:20px;background:var(--card);cursor:pointer;color:var(--muted);transition:.12s}
  .chip:hover{border-color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip.addbtn{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

  /* board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
  .col-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px}
  .col-head .cname{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
  .col-head .cbadge{width:9px;height:9px;border-radius:3px}
  .col-head .cnum{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1px 8px}
  .col.pend .cbadge{background:var(--pend)} .col.proc .cbadge{background:var(--proc)} .col.real .cbadge{background:var(--real)} .col.bloq .cbadge{background:var(--bloq)}
  .col-body{display:flex;flex-direction:column;gap:9px;padding:4px;border-radius:10px;min-height:60px;transition:.12s}
  .col-body.drag-over{background:var(--accent-soft);outline:2px dashed var(--accent);outline-offset:-3px}

  .card{background:var(--card);border:1px solid var(--line);border-left-width:3px;border-radius:9px;padding:11px 12px;box-shadow:var(--shadow);cursor:grab;position:relative}
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.4}
  .card.p-Alta{border-left-color:var(--bloq)} .card.p-Media{border-left-color:var(--pend)} .card.p-Baja{border-left-color:var(--muted)}
  .card .ctop{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:5px}
  .card .cid{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted)}
  .card .ccat{font-family:ui-monospace,Menlo,monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-weight:600}
  .card h3{font-size:14px;margin:0 0 6px;font-weight:600;line-height:1.28;cursor:pointer}
  .card .meta{display:flex;flex-wrap:wrap;gap:5px 9px;font-size:11px;color:var(--muted);align-items:center}
  .card .who{font-weight:600}
  .tag-person{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;color:#fff}
  .p-jenny{background:var(--jenny)} .p-juan{background:var(--juan)} .p-otro{background:var(--muted)}
  .due{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;padding:2px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
  .due.soon{background:var(--pend-bg);color:var(--pend);font-weight:700}
  .due.over{background:var(--bloq-bg);color:var(--bloq);font-weight:700}
  .due.ok{background:transparent;color:var(--muted)}
  .card .icons{display:flex;gap:9px;margin-top:7px;font-size:11px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
  .card .icons span{display:inline-flex;align-items:center;gap:3px}
  .subprog{height:4px;border-radius:4px;background:var(--accent-soft);margin-top:7px;overflow:hidden}
  .subprog i{display:block;height:100%;background:var(--real)}
  .card .move{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap}
  .mvbtn{font-family:ui-monospace,Menlo,monospace;font-size:10px;padding:3px 8px;border:1px solid var(--line);border-radius:6px;background:transparent;cursor:pointer;color:var(--muted)}
  .mvbtn:hover{border-color:var(--ink);color:var(--ink)}
  .empty{font-size:12px;color:var(--muted);text-align:center;padding:22px 8px;font-style:italic;opacity:.7}

  /* person view */
  .person-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px}
  .person-col{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .person-col h2{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .person-col .psub{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted);margin-bottom:12px}
  .prow{padding:9px 0;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:4px;cursor:pointer}
  .prow:hover{background:var(--paper)}
  .prow .pt{font-size:13px;font-weight:600;line-height:1.25}
  .prow .pm{display:flex;gap:8px;align-items:center;font-size:10.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
  .stbadge{width:8px;height:8px;border-radius:2px;display:inline-block}
  .st-Pendiente{background:var(--pend)} .st-En\ proceso{background:var(--proc)} .st-Realizada{background:var(--real)} .st-Bloqueada{background:var(--bloq)}

  /* gantt */
  .gantt{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;box-shadow:var(--shadow);overflow-x:auto}
  .gantt-inner{min-width:900px}
  .g-months{display:grid;position:sticky;top:0;background:var(--card);z-index:2;border-bottom:1px solid var(--line)}
  .g-month{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;padding:8px 2px;border-left:1px solid var(--line)}
  .g-row{display:grid;align-items:center;border-bottom:1px solid var(--paper);min-height:34px}
  .g-row:hover{background:var(--paper)}
  .g-label{padding:5px 10px 5px 4px;font-size:12px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:sticky;left:0;background:inherit;z-index:1;cursor:pointer}
  .g-track{position:relative;height:34px;grid-column:2 / -1}
  .g-bar{position:absolute;top:8px;height:18px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;color:#fff;font-family:ui-monospace,Menlo,monospace;white-space:nowrap;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .g-bar.Pendiente{background:var(--pend)} .g-bar.En\ proceso{background:var(--proc)} .g-bar.Realizada{background:var(--real)} .g-bar.Bloqueada{background:var(--bloq)}
  .g-today{position:absolute;top:0;bottom:0;width:2px;background:var(--bloq);z-index:3}
  .g-cat-head{font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:12px 8px 5px;font-weight:700}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,20,15,.42);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .scrim.open{display:flex}
  .modal{background:var(--card);border-radius:14px;max-width:600px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.28);padding:22px 24px}
  .modal h2{margin:0 0 3px;font-size:20px}
  .modal .mid{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);margin-bottom:16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px;font-family:ui-monospace,Menlo,monospace}
  .field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink)}
  .field textarea{min-height:56px;resize:vertical}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .section-t{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:18px 0 8px;font-weight:700;border-top:1px solid var(--line);padding-top:14px}

  /* subtasks */
  .sub-item{display:flex;align-items:center;gap:9px;padding:6px 0}
  .sub-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent);flex:none;cursor:pointer}
  .sub-item .st-txt{flex:1;font-size:13px}
  .sub-item.done .st-txt{text-decoration:line-through;color:var(--muted)}
  .sub-item .xdel{cursor:pointer;color:var(--muted);font-size:15px;padding:0 4px;border:none;background:none}
  .sub-item .xdel:hover{color:var(--bloq)}
  .addrow{display:flex;gap:7px;margin-top:6px}
  .addrow input{flex:1;font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--paper)}
  .addrow button{font-family:ui-monospace,Menlo,monospace;font-size:12px;padding:7px 12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:7px;cursor:pointer}

  /* comments */
  .cmt{padding:8px 0;border-top:1px solid var(--line)}
  .cmt .ch{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;margin-bottom:3px}
  .cmt .ch b{color:var(--ink)}
  .cmt .cbody{font-size:13px;line-height:1.4}
  .cmt .xdel{cursor:pointer;color:var(--muted);border:none;background:none;font-size:13px}
  .cmt .xdel:hover{color:var(--bloq)}
  .cmt-compose{margin-top:10px}
  .cmt-compose .who-pick{display:flex;gap:6px;margin-bottom:6px}
  .cmt-compose .who-pick .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .cmt-compose textarea{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--paper);min-height:46px;resize:vertical}

  .mactions{display:flex;justify-content:space-between;gap:10px;margin-top:18px;border-top:1px solid var(--line);padding-top:15px}
  .btn{font-family:inherit;font-size:14px;padding:9px 18px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--ink)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .btn.danger{color:var(--bloq);border-color:var(--bloq-bg)}
  .btn:hover{filter:brightness(.97)}
  .loading{text-align:center;padding:60px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;font-size:13px}
  .hidden{display:none !important}

  @media(max-width:1000px){.board{grid-template-columns:repeat(2,1fr)}.person-cols{grid-template-columns:1fr}}
  @media(max-width:600px){.board{grid-template-columns:1fr}.brand h1{font-size:22px}.frow{grid-template-columns:1fr}.wrap{padding:16px 13px 70px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Seguimiento de acuerdos</h1>
      <div class="sub">Jenny Torres · Juan Luis Corporán — desde 24 mayo 2026</div>
    </div>
    <div class="toolbar">
      <button class="iobtn" id="syncBtn" style="background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600">⟳ Sincronizar</button>
      <button class="iobtn" id="cfgBtn">⚙ Conexión</button>
      <button class="iobtn" id="exportBtn">↓ Exportar</button>
      <button class="iobtn" id="importBtn">↑ Importar</button>
      <input type="file" id="fileInput" accept=".json" class="hidden">
      <span class="synced"><span class="dot" id="syncDot"></span><span id="syncTxt">Guardado</span></span>
    </div>
  </header>

  <div class="tabs">
    <div class="tab on" data-view="board">Tablero</div>
    <div class="tab" data-view="person">Por persona</div>
    <div class="tab" data-view="gantt">Cronograma Gantt</div>
  </div>

  <div id="progressWrap"><div class="progress-strip" id="progress"></div></div>

  <div class="controls" id="controls">
    <input type="search" id="search" placeholder="Buscar tarea, persona, tema…">
    <span class="chip catchip on" data-cat="all">Todas</span>
    <span class="chip catchip" data-cat="Producción">Producción</span>
    <span class="chip catchip" data-cat="Organización">Organización</span>
    <span class="chip catchip" data-cat="Transversales">Transversales</span>
    <span class="chip catchip" data-cat="Vida personal">Vida personal</span>
    <span class="chip catchip" data-cat="Mantenimiento">Mantenimiento</span>
    <span class="chip catchip" data-cat="Formación">Formación</span>
    <span class="chip" id="soonChip" data-soon="1">⏱ Próximas (14 días)</span>
    <span class="chip addbtn" id="addBtn">+ Nueva tarea</span>
  </div>

  <div id="app"><div class="loading">Cargando…</div></div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>

<script>

  if (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'){
    return window.storage;
  }
  return {
    get: async (k)=>{ try{ const v=localStorage.getItem(k); return v!==null?{value:v}:null; }catch(e){ return null; } },
    set: async (k,v)=>{ try{ localStorage.setItem(k,v); }catch(e){} return {value:v}; },
  };
})();
function setSync(s){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(s){d.classList.add('saving');t.textContent='Guardando…';}else{d.classList.remove('saving');t.textContent='Guardado';}}
async function loadTasks(){try{const r=await STORE.get(STORE_KEY,true);if(r&&r.value){tasks=JSON.parse(r.value);normalize();return;}}catch(e){}tasks=SEED.map(t=>({...t}));normalize();await saveTasks();}
function normalize(){tasks.forEach(t=>{if(!Array.isArray(t.subtasks))t.subtasks=[];if(!Array.isArray(t.comments))t.comments=[];});}
let saveTimer=null;
async function saveTasks(){setSync(true);try{await STORE.set(STORE_KEY,JSON.stringify(tasks),true);}catch(e){console.error(e);}setSync(false);}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveTasks,250);}

/* ---- SYNC con Google Sheets (manual) ---- */
const URL_KEY='seguimiento_sync_url';
let SYNC_URL='';
async function loadSyncUrl(){try{const r=await STORE.get(URL_KEY,false);if(r&&r.value)SYNC_URL=r.value;}catch(e){}}
async function saveSyncUrl(u){SYNC_URL=u;try{await STORE.set(URL_KEY,u,false);}catch(e){}}
function touch(t){t._m=Date.now();}
function ensureStamps(){let ch=false;tasks.forEach(t=>{if(!t._m){t._m=1;ch=true;}});return ch;}

// Fusiona la lista remota con la local: por cada tarea gana la versión con _m más reciente.
// Las tareas que existen en una sola de las dos se conservan.
function merge(remote){
  const byId={};
  tasks.forEach(t=>byId[t.id]={...t});
  remote.forEach(r=>{
    if(!r||!r.id)return;
    if(!r._m)r._m=1;
    const local=byId[r.id];
    if(!local){ byId[r.id]=r; }               // solo existe remota → traer
    else if((r._m||0)>(local._m||0)){ byId[r.id]=r; } // remota más nueva → gana
    // si local es más nueva o igual, se queda la local
  });
  return Object.values(byId);
}

function syncStatus(msg,kind){
  const t=document.getElementById('syncTxt');const d=document.getElementById('syncDot');
  t.textContent=msg;
  d.style.background = kind==='err'?'var(--bloq)':kind==='busy'?'var(--pend)':'var(--real)';
  d.classList.toggle('saving',kind==='busy');
}

async function doSync(){
  if(!SYNC_URL){ openConfig(); return; }
  ensureStamps();
  syncStatus('Sincronizando…','busy');
  try{
    // 1) traer remoto
    const res=await fetch(SYNC_URL,{method:'GET'});
    const txt=await res.text();
    let remote=[];
    try{ remote=JSON.parse(txt); }catch(e){ remote=[]; }
    if(!Array.isArray(remote)) remote=[];
    // 2) fusionar
    tasks=merge(remote);
    normalize();
    // 3) enviar el resultado fusionado
    await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(tasks)});
    await saveTasks();
    renderAll();
    const now=new Date().toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});
    syncStatus('Sincronizado '+now,'ok');
  }catch(err){
    console.error(err);
    syncStatus('Error de conexión','err');
    alert('No se pudo sincronizar. Revisa la conexión o la URL en ⚙ Conexión.\\n\\nDetalle: '+err);
  }
}

/* dates */
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function parseD(s){if(!s)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d;}
function daysTo(s){const d=parseD(s);if(!d)return null;return Math.round((d-today())/864e5);}
function fmtD(s){const d=parseD(s);if(!d)return '—';return d.toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'2-digit'});}
function dueClass(t){if(t.estado==='Realizada')return 'ok';const n=daysTo(t.obj);if(n===null)return 'ok';if(n<0)return 'over';if(n<=14)return 'soon';return 'ok';}
function dueLabel(t){const n=daysTo(t.obj);if(t.estado==='Realizada')return 'hecho';if(n===null)return fmtD(t.obj);if(n<0)return 'venció '+fmtD(t.obj);if(n===0)return 'hoy';if(n<=14)return 'en '+n+'d';return fmtD(t.obj);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function personClass(name){const n=(name||'').toLowerCase();if(n.includes('jenny'))return 'p-jenny';if(n.includes('juan'))return 'p-juan';return 'p-otro';}

/* progress */
function renderProgress(){const box=document.getElementById('progress');box.innerHTML='';CATS.forEach(cat=>{const list=tasks.filter(t=>t.cat===cat&&!t._del);if(!list.length)return;const c={};list.forEach(t=>c[t.estado]=(c[t.estado]||0)+1);const tot=list.length,pct=s=>((c[s]||0)/tot*100);const el=document.createElement('div');el.className='pcard';el.innerHTML=`<div class="plabel"><span>${cat}</span><span class="pcount">${c['Realizada']||0}/${tot} hechas</span></div><div class="bar"><i class="real" style="width:${pct('Realizada')}%"></i><i class="proc" style="width:${pct('En proceso')}%"></i><i class="pend" style="width:${pct('Pendiente')}%"></i><i class="bloq" style="width:${pct('Bloqueada')}%"></i></div>`;box.appendChild(el);});}

/* filter */
function visible(){return tasks.filter(t=>{if(t._del)return false;if(filterCat!=='all'&&t.cat!==filterCat)return false;if(filterSoon){const n=daysTo(t.obj);if(t.estado==='Realizada')return false;if(n===null||n>14)return false;}if(searchТ){const hay=(t.tarea+' '+t.desc+' '+t.resp+' '+t.coresp+' '+t.notas+' '+t.sub).toLowerCase();if(!hay.includes(searchТ))return false;}return true;});}

function subCount(t){const d=t.subtasks.filter(s=>s.done).length;return {d,n:t.subtasks.length};}

/* ---- BOARD ---- */
function renderBoard(){const app=document.getElementById('app');const vis=visible();const board=document.createElement('div');board.className='board';STATES.forEach(st=>{const inState=vis.filter(t=>t.estado===st.key);const col=document.createElement('div');col.className='col '+st.cls;col.innerHTML=`<div class="col-head"><span class="cname"><span class="cbadge"></span>${st.label}</span><span class="cnum">${inState.length}</span></div>`;const body=document.createElement('div');body.className='col-body';body.dataset.state=st.key;body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain');const t=tasks.find(x=>x.id===id);if(t&&t.estado!==st.key){t.estado=st.key;touch(t);queueSave();renderAll();}});if(!inState.length){const em=document.createElement('div');em.className='empty';em.textContent='Sin tareas aquí';body.appendChild(em);}inState.forEach(t=>body.appendChild(cardEl(t)));col.appendChild(body);board.appendChild(col);});app.innerHTML='';app.appendChild(board);}
function nextStates(cur){return STATES.filter(s=>s.key!==cur);}
function cardEl(t){const el=document.createElement('div');el.className='card p-'+(t.prio||'Media');el.draggable=true;el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',t.id);el.classList.add('dragging');});el.addEventListener('dragend',()=>el.classList.remove('dragging'));const sc=subCount(t);const moves=nextStates(t.estado).map(s=>`<button class="mvbtn" data-mv="${s.key}">→ ${s.label}</button>`).join('');let icons='';if(sc.n)icons+=`<span>☑ ${sc.d}/${sc.n}</span>`;if(t.comments.length)icons+=`<span>💬 ${t.comments.length}</span>`;el.innerHTML=`<div class="ctop"><span class="ccat">${t.cat}</span><span class="cid">${t.id}</span></div><h3>${esc(t.tarea)}</h3><div class="meta"><span class="tag-person ${personClass(t.resp)}">${esc(t.resp)}</span>${t.coresp?`<span class="tag-person ${personClass(t.coresp)}">${esc(t.coresp)}</span>`:''}<span class="due ${dueClass(t)}">${dueLabel(t)}</span></div>${sc.n?`<div class="subprog"><i style="width:${sc.d/sc.n*100}%"></i></div>`:''}${icons?`<div class="icons">${icons}</div>`:''}<div class="move">${moves}</div>`;el.querySelector('h3').addEventListener('click',()=>openModal(t.id));el.querySelector('.ccat').addEventListener('click',()=>openModal(t.id));el.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',ev=>{ev.stopPropagation();t.estado=b.dataset.mv;touch(t);queueSave();renderAll();}));return el;}

/* ---- PERSON VIEW ---- */
function personBucket(t){const who=[];const rc=personClass(t.resp);if(rc==='p-jenny')who.push('Jenny');else if(rc==='p-juan')who.push('Juan Luis');const cc=personClass(t.coresp);if(t.coresp){if(cc==='p-jenny'&&!who.includes('Jenny'))who.push('Jenny');if(cc==='p-juan'&&!who.includes('Juan Luis'))who.push('Juan Luis');}if(!who.length)who.push('Otros');return who;}
function renderPerson(){const app=document.getElementById('app');const vis=visible();const cols={'Jenny':[],'Juan Luis':[],'Otros':[]};vis.forEach(t=>{personBucket(t).forEach(p=>{if(cols[p])cols[p].push(t);else cols['Otros'].push(t);});});const order=[['Jenny','p-jenny'],['Juan Luis','p-juan'],['Otros','p-otro']];const wrap=document.createElement('div');wrap.className='person-cols';order.forEach(([name,cls])=>{const list=cols[name];const done=list.filter(t=>t.estado==='Realizada').length;const col=document.createElement('div');col.className='person-col';col.innerHTML=`<h2><span class="tag-person ${cls}">${name}</span></h2><div class="psub">${list.length} tareas · ${done} hechas · ${list.filter(t=>t.estado!=='Realizada'&&daysTo(t.obj)!==null&&daysTo(t.obj)<0).length} vencidas</div>`;const sorted=[...list].sort((a,b)=>{const da=parseD(a.obj),db=parseD(b.obj);if(!da)return 1;if(!db)return -1;return da-db;});sorted.forEach(t=>{const row=document.createElement('div');row.className='prow';row.innerHTML=`<div class="pt">${esc(t.tarea)}</div><div class="pm"><span class="stbadge st-${t.estado.replace(' ','\\ ')}"></span>${t.estado} · ${dueLabel(t)} · <span style="color:var(--accent)">${esc(t.cat)}</span></div>`;row.addEventListener('click',()=>openModal(t.id));col.appendChild(row);});if(!list.length){const em=document.createElement('div');em.className='empty';em.textContent='Sin tareas';col.appendChild(em);}wrap.appendChild(col);});app.innerHTML='';app.appendChild(wrap);}

/* ---- GANTT ---- */
function renderGantt(){const app=document.getElementById('app');const vis=visible().filter(t=>parseD(t.ini)||parseD(t.obj));
  // range
  let min=null,max=null;vis.forEach(t=>{const a=parseD(t.ini)||parseD(t.obj),b=parseD(t.obj)||parseD(t.ini);if(a&&(!min||a<min))min=a;if(b&&(!max||b>max))max=b;});
  if(!min){app.innerHTML='<div class="empty" style="padding:40px">No hay tareas con fechas para mostrar.</div>';return;}
  min=new Date(min.getFullYear(),min.getMonth(),1);max=new Date(max.getFullYear(),max.getMonth()+1,0);
  const months=[];let cur=new Date(min);while(cur<=max){months.push(new Date(cur));cur.setMonth(cur.getMonth()+1);}
  const totalDays=(max-min)/864e5+1;const LABELW=220;
  const gantt=document.createElement('div');gantt.className='gantt';const inner=document.createElement('div');inner.className='gantt-inner';
  const colTemplate=`${LABELW}px repeat(${months.length},1fr)`;
  // month header
  const mh=document.createElement('div');mh.className='g-months';mh.style.gridTemplateColumns=colTemplate;mh.innerHTML=`<div></div>`+months.map(m=>`<div class="g-month">${m.toLocaleDateString('es-DO',{month:'short'})} '${String(m.getFullYear()).slice(2)}</div>`).join('');inner.appendChild(mh);
  const pctFor=d=>((d-min)/864e5)/totalDays*100;
  const nowPct=pctFor(today());
  // group by category
  CATS.forEach(cat=>{const list=vis.filter(t=>t.cat===cat).sort((a,b)=>(parseD(a.ini)||parseD(a.obj))-(parseD(b.ini)||parseD(b.obj)));if(!list.length)return;const ch=document.createElement('div');ch.className='g-cat-head';ch.textContent=cat;inner.appendChild(ch);
    list.forEach(t=>{const row=document.createElement('div');row.className='g-row';row.style.gridTemplateColumns=colTemplate;const a=parseD(t.ini)||parseD(t.obj),b=parseD(t.obj)||parseD(t.ini);let left=pctFor(a),right=pctFor(b);let w=Math.max(right-left,1.2);
      const track=document.createElement('div');track.className='g-track';
      const bar=document.createElement('div');bar.className='g-bar '+t.estado;bar.style.left=left+'%';bar.style.width=w+'%';bar.title=t.tarea+' · '+dueLabel(t);bar.textContent=t.id;bar.addEventListener('click',()=>openModal(t.id));
      if(nowPct>=0&&nowPct<=100){const tl=document.createElement('div');tl.className='g-today';tl.style.left=nowPct+'%';track.appendChild(tl);}
      track.appendChild(bar);
      const lbl=document.createElement('div');lbl.className='g-label';lbl.textContent=t.tarea;lbl.title=t.tarea;lbl.addEventListener('click',()=>openModal(t.id));
      row.appendChild(lbl);row.appendChild(track);inner.appendChild(row);});
  });
  gantt.appendChild(inner);app.innerHTML='';app.appendChild(gantt);}

let editingId=null;
function openModal(id){const t=id?tasks.find(x=>x.id===id):{id:'',cat:'Producción',sub:'',tarea:'',desc:'',resp:'Jenny',coresp:'',ini:null,obj:null,estado:'Pendiente',prio:'Media',notas:'',subtasks:[],comments:[]};editingId=id;const isNew=!id;const m=document.getElementById('modal');

  const cmtHTML=t.comments.map((c,i)=>`<div class="cmt"><div class="ch"><b>${esc(c.autor)}</b><span>${esc(c.fecha)} <button class="xdel" data-cmtdel="${i}">✕</button></span></div><div class="cbody">${esc(c.texto)}</div></div>`).join('');
  m.innerHTML=`<h2>${isNew?'Nueva tarea':esc(t.tarea)}</h2><div class="mid">${isNew?'Se añadirá al tablero':t.id+' · '+t.cat}</div>
    <div class="field"><label>Tarea</label><input id="f_tarea" value="${esc(t.tarea)}"></div>
    <div class="field"><label>Descripción</label><textarea id="f_desc">${esc(t.desc)}</textarea></div>
    <div class="frow"><div class="field"><label>Categoría</label><select id="f_cat">${CATS.map(c=>`<option ${c===t.cat?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>Sub-tema</label><input id="f_sub" value="${esc(t.sub)}"></div></div>
    <div class="frow"><div class="field"><label>Responsable</label><input id="f_resp" value="${esc(t.resp)}"></div><div class="field"><label>Co-responsable</label><input id="f_coresp" value="${esc(t.coresp)}"></div></div>
    <div class="frow"><div class="field"><label>Fecha inicio</label><input type="date" id="f_ini" value="${t.ini||''}"></div><div class="field"><label>Fecha objetivo</label><input type="date" id="f_obj" value="${t.obj||''}"></div></div>
    <div class="frow"><div class="field"><label>Estado</label><select id="f_estado">${STATES.map(s=>`<option ${s.key===t.estado?'selected':''}>${s.key}</option>`).join('')}</select></div><div class="field"><label>Prioridad</label><select id="f_prio">${['Alta','Media','Baja'].map(p=>`<option ${p===t.prio?'selected':''}>${p}</option>`).join('')}</select></div></div>
    <div class="field"><label>Notas</label><textarea id="f_notas">${esc(t.notas)}</textarea></div>
    ${isNew?'':`<div class="section-t">Subtareas</div><div id="subList">${subHTML||'<div class="empty" style="padding:6px;text-align:left">Sin subtareas aún.</div>'}</div><div class="addrow"><input id="newSub" placeholder="Añadir subtarea y Enter…"><button id="addSubBtn">Añadir</button></div>
    <div class="section-t">Comentarios</div><div id="cmtList">${cmtHTML||'<div class="empty" style="padding:6px;text-align:left">Sin comentarios aún.</div>'}</div>
    <div class="cmt-compose"><div class="who-pick"><span class="chip whopick on" data-who="Jenny">Jenny</span><span class="chip whopick" data-who="Juan Luis">Juan Luis</span></div><textarea id="newCmt" placeholder="Escribe un comentario…"></textarea><div style="margin-top:6px"><button class="btn primary" id="addCmtBtn" style="padding:7px 14px;font-size:13px">Comentar</button></div></div>`}
    <div class="mactions"><div>${isNew?'':'<button class="btn danger" id="delBtn">Eliminar tarea</button>'}</div><div style="display:flex;gap:8px"><button class="btn" id="cancelBtn">Cerrar</button><button class="btn primary" id="saveBtn">${isNew?'Crear':'Guardar'}</button></div></div>`;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('cancelBtn').onclick=closeModal;
  document.getElementById('saveBtn').onclick=()=>saveModal(t,isNew);

  if(!isNew){
    // subtasks
    m.querySelectorAll('[data-sub]').forEach(cb=>cb.addEventListener('change',()=>{t.subtasks[+cb.dataset.sub].done=cb.checked;touch(t);queueSave();openModal(id);}));
    m.querySelectorAll('[data-subdel]').forEach(b=>b.addEventListener('click',()=>{t.subtasks.splice(+b.dataset.subdel,1);touch(t);queueSave();openModal(id);}));
    const nס=document.getElementById('newSub');const addSub=()=>{const v=nס.value.trim();if(!v)return;t.subtasks.push({txt:v,done:false});touch(t);queueSave();openModal(id);};
    document.getElementById('addSubBtn').onclick=addSub;nס.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addSub();}});
    // comments
    let who='Jenny';m.querySelectorAll('.whopick').forEach(c=>c.addEventListener('click',()=>{m.querySelectorAll('.whopick').forEach(x=>x.classList.remove('on'));c.classList.add('on');who=c.dataset.who;}));
    m.querySelectorAll('[data-cmtdel]').forEach(b=>b.addEventListener('click',()=>{t.comments.splice(+b.dataset.cmtdel,1);touch(t);queueSave();openModal(id);}));
    document.getElementById('addCmtBtn').onclick=()=>{const v=document.getElementById('newCmt').value.trim();if(!v)return;const f=new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});t.comments.push({autor:who,texto:v,fecha:f});touch(t);queueSave();openModal(id);};
  }
}
function saveModal(t,isNew){const g=i=>document.getElementById(i).value;const data={cat:g('f_cat'),sub:g('f_sub'),tarea:g('f_tarea').trim(),desc:g('f_desc'),resp:g('f_resp'),coresp:g('f_coresp'),ini:g('f_ini')||null,obj:g('f_obj')||null,estado:g('f_estado'),prio:g('f_prio'),notas:g('f_notas')};if(!data.tarea){alert('Escribe el nombre de la tarea.');return;}if(isNew){const nums=tasks.map(x=>parseInt((x.id||'').replace('T-',''))||0);data.id='T-'+String(Math.max(0,...nums)+1).padStart(3,'0');data.subtasks=[];data.comments=[];touch(data);tasks.push(data);}else{Object.assign(t,data);touch(t);}saveTasks();closeModal();renderAll();}
function closeModal(){editingId=null;document.getElementById('scrim').classList.remove('open');}
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeModal();});

/* export / import */
document.getElementById('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(tasks,null,1)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='seguimiento_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);};
document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const data=JSON.parse(rd.result);if(!Array.isArray(data))throw 0;if(!confirm('Esto reemplazará el tablero actual con '+data.length+' tareas del archivo. ¿Continuar?'))return;tasks=data;normalize();saveTasks();renderAll();}catch(err){alert('El archivo no es válido.');}};rd.readAsText(f);e.target.value='';});

/* views + controls */
function renderAll(){renderProgress();if(view==='board')renderBoard();else if(view==='person')renderPerson();else renderGantt();}
document.querySelectorAll('.tab').forEach(tb=>tb.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));tb.classList.add('on');view=tb.dataset.view;document.getElementById('progressWrap').classList.toggle('hidden',view!=='board');renderAll();}));
document.querySelectorAll('.catchip').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.catchip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filterCat=c.dataset.cat;renderAll();}));
document.getElementById('soonChip').addEventListener('click',function(){filterSoon=!filterSoon;this.classList.toggle('on',filterSoon);renderAll();});
document.getElementById('search').addEventListener('input',e=>{searchТ=e.target.value.toLowerCase().trim();renderAll();});
document.getElementById('addBtn').addEventListener('click',()=>openModal(null));
document.getElementById('syncBtn').addEventListener('click',doSync);
document.getElementById('cfgBtn').addEventListener('click',openConfig);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

(async function(){await loadSyncUrl();await loadTasks();ensureStamps();renderAll();if(SYNC_URL){doSync();}else{syncStatus('Sin conexión — pulsa ⚙ Conexión','ok');}})();
</script>
</body>
